version: '3.8'

services:
  jeikchat:
    build:
      context: .
      dockerfile: Dockerfile
    image: jeikchat:latest
    container_name: jeikchat
    ports:
      - "88:80"
    volumes:
      # 只保留应用数据卷
      - jeikchat-config:/backend/config
      - jeikchat-knowledges:/backend/agent/knowledges
      - jeikchat-mcp:/backend/agent/mcp
      # 注意：不挂载 nginx 配置，使用容器内的配置
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/backend
    restart: unless-stopped
    networks:
      - jeikchat-network

networks:
  jeikchat-network:
    driver: bridge

# 声明命名卷
volumes:
  jeikchat-config:
  jeikchat-knowledges:
  jeikchat-mcp:
