services:
  jeikchat:
    build:
      context: .
      dockerfile: Dockerfile
    image: jeikchat:latest
    container_name: jeikcha
    ports:
      - "89:80"
    volumes:
      - ./backend/config:/backend/config
      - ./backend/agent/knowledges:/backend/agent/knowledges
      - ./backend/agent/mcp:/backend/agent/mcp
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/backend
    restart: unless-stopped
    networks:
      - jeikchat-netw

networks:
  jeikchat-netw:
    driver: bridge
