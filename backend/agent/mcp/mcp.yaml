servers:
- name: postgres-full
  transport: stdio
  enabled: true
  timeout: 30
  command: npx
  args:
  - -y
  - mcp-postgres-full-access
  - postgresql://root:anhuang520@pan.junv.top:5432/postgres
  env:
    MAX_CONCURRENT_TRANSACTIONS: '5'
    PG_STATEMENT_TIMEOUT_MS: '30000'
    TRANSACTION_TIMEOUT_MS: '60000'
  windows:
    command: npx
    args:
    - -y
    - mcp-postgres-full-access
    - postgresql://root:anhuang520@pan.junv.top:5432/postgres
- name: 12306-mcp
  transport: stdio
  enabled: true
  timeout: 30
  command: npx
  args:
  - -y
  - 12306-mcp
  windows:
    command: cmd
    args:
    - /c
    - npx
    - -y
    - 12306-mcp
- name: zhipu-web-search-sse
  transport: sse
  enabled: true
  timeout: 30
  url: https://open.bigmodel.cn/api/mcp/web_search/sse?Authorization=834213e9b3cb42769cf3f5d4641a8df1.4xDerkV5c9x4PopI
- name: github
  transport: streamable_http
  enabled: true
  timeout: 30
  url: https://mcp.api-inference.modelscope.net/4c25504c7a9f4e/mcp
- name: Gaodeamp
  transport: streamable_http
  enabled: true
  timeout: 30
  url: https://mcp.api-inference.modelscope.net/3fd5651a65fa47/mcp
settings:
  timeout: 30
  auto_reload: true
  log_level: info
default_selected_tools:
- get_current_time
