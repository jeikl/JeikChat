# MCP 服务配置
servers:
  # STDIO 模式 - PostgreSQL MCP (mcp-postgres-full-access)
  - name: postgres-full
    transport: stdio
    command: npx
    args: [-y, mcp-postgres-full-access, postgresql://root:anhuang520@pan.junv.top:5432/postgres]
    env:
      MAX_CONCURRENT_TRANSACTIONS: "5"
      PG_STATEMENT_TIMEOUT_MS: "30000"
      TRANSACTION_TIMEOUT_MS: "60000"
    windows:
      command: npx
      args: [-y, mcp-postgres-full-access, postgresql://root:anhuang520@pan.junv.top:5432/postgres]

  # STDIO 模式 - 已注释
  # - name: bing-search
  #   transport: stdio
  #   command: npx
  #   args: [-y, bing-cn-mcp]
  #   windows:
  #     command: cmd
  #     args: [/c, npx, -y, bing-cn-mcp]

  - name: 12306-mcp
    transport: stdio
    command: npx
    args: [-y, 12306-mcp]
    windows:
      command: cmd
      args: [/c, npx, -y, 12306-mcp]



  - name: zhipu-web-search-sse
    transport: sse
    url: https://open.bigmodel.cn/api/mcp/web_search/sse?Authorization=834213e9b3cb42769cf3f5d4641a8df1.4xDerkV5c9x4PopI

  - name: github
    transport: streamable_http
    url: https://mcp.api-inference.modelscope.net/4c25504c7a9f4e/mcp

  - name: Gaodeamp
    transport: streamable_http
    url: https://mcp.api-inference.modelscope.net/3fd5651a65fa47/mcp



settings:
  timeout: 30
  auto_reload: true
  log_level: info

# 默认选中的工具列表（用户选择会覆盖此默认设置）
# 内置工具直接使用工具名称（如 get_current_time）
# MCP 工具使用 服务名_工具名 格式（如 zhipu-web-search-sse_webSearchPro）
# 支持通配符 * 匹配，如 zhipu-web-search-sse_* 表示选中该服务的所有工具
# - * - 匹配任意字符序列
# - ? - 匹配单个字符
default_selected_tools:
  # 内置工具
  - get_current_time
  # Web 搜索工具（使用通配符选中该服务所有工具）
  - zhipu-web-search-sse_*
  # 其他常用工具
  # - github_github_fork_repository
  # - Gaodeamp_gaode_maps_geocode
