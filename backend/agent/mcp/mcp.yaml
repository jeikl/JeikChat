# MCP 服务配置
servers:
  # STDIO 模式 - PostgreSQL MCP (mcp-postgres-full-access)
  - name: postgres-full
    transport: stdio
    command: npx
    args: [-y, mcp-postgres-full-access, postgresql://root:anhuang520@pan.junv.top:5432/postgres]
    env:
      MAX_CONCURRENT_TRANSACTIONS: "5"
      PG_STATEMENT_TIMEOUT_MS: "30000"
      TRANSACTION_TIMEOUT_MS: "60000"
    windows:
      command: npx
      args: [-y, mcp-postgres-full-access, postgresql://root:anhuang520@pan.junv.top:5432/postgres]

  # STDIO 模式 - 已注释
